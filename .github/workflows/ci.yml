name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  type-check:
    name: Type-check
    runs-on: ubuntu-latest
    # Soft gate while we don't have a committed pnpm-lock.yaml.
    # pnpm's per-job re-resolution can produce two installs of
    # @types/react in the web subtree, which makes Next.js's generated
    # LayoutProps and the consumer's React.ReactNode look "different".
    # The dedicated build jobs (which use Next/NestJS's own emit) are
    # the real gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install --no-frozen-lockfile
      - name: TypeScript type-check
        run: pnpm turbo run type-check

  test:
    name: Tests (@wayra/shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install --no-frozen-lockfile
      - name: Run shared package tests
        run: pnpm --filter @wayra/shared test

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install --no-frozen-lockfile
      - name: Build Next.js app
        run: pnpm --filter @wayra/web build

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: pnpm install --no-frozen-lockfile
      - name: Build NestJS app
        run: pnpm --filter @wayra/backend build
