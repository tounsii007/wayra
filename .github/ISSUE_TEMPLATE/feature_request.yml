name: Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - frontend
        - mobile
        - infra/CI
        - other
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Who is affected and why does the missing feature matter?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: One or two paragraphs. Sketches and screenshots welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you prefer your proposal.
