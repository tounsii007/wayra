version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: wayra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wayra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wayra}
      POSTGRES_DB: ${POSTGRES_DB:-wayra}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/backend/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wayra} -d ${POSTGRES_DB:-wayra}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wayra-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: wayra-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-wayra}:${POSTGRES_PASSWORD:-wayra}@postgres:5432/${POSTGRES_DB:-wayra}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-replace-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Demo data auto-import on first boot (set to false to skip)
      WAYRA_AUTO_IMPORT_DEMO: ${WAYRA_AUTO_IMPORT_DEMO:-true}
      WAYRA_DEMO_FEED: ${WAYRA_DEMO_FEED:-wayra-demo}
      WAYRA_DEMO_DIR: /app/db/demo-gtfs/wayra-demo
      WAYRA_DEMO_COUNTRY: ${WAYRA_DEMO_COUNTRY:-DE}
    ports:
      - '4000:4000'

  # Adminer for DB inspection (dev profile only)
  adminer:
    image: adminer:latest
    container_name: wayra-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles: ['dev']

  # OpenTripPlanner 2 — multimodal routing engine.
  # Enable with `--profile otp`. First boot builds the graph from any
  # GTFS feeds + OSM extracts placed in apps/backend/otp/graphs/.
  otp:
    image: docker.io/opentripplanner/opentripplanner:2.6.0
    container_name: wayra-otp
    restart: unless-stopped
    profiles: ['otp']
    ports:
      - '8088:8080'
    volumes:
      - ./apps/backend/otp/graphs:/var/opentripplanner
    command:
      - '--build'
      - '--save'
      - '--serve'
      - '/var/opentripplanner'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/otp/v1/serverinfo']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres-data:
  redis-data:
